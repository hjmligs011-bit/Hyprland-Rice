# ============================================================
# Mono Glass — tema preto e branco com leve transparência
# Para Kitty Terminal
#
# Como usar:
#   1. Copie este arquivo para ~/.config/kitty/mono-glass.conf
#   2. No seu kitty.conf, adicione a linha:
#        include mono-glass.conf
#   3. Recarregue o kitty (ctrl+shift+F5) ou reabra o terminal
# ============================================================

# --- Transparência e desfoque ---
background_opacity 0.85
dynamic_background_opacity yes
background_blur 32

# --- Cores base ---
foreground            #E6E6E6
background            #0A0A0A
selection_foreground  #000000
selection_background  #E6E6E6

# --- Cursor ---
cursor                #FFFFFF
cursor_text_color     #000000
cursor_shape          beam
cursor_blink_interval 0.5

# --- Bordas de janelas (splits) ---
active_border_color    #FFFFFF
inactive_border_color  #3A3A3A
bell_border_color      #FFFFFF

# --- Barra de abas (tab bar) ---
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_background     #000000
active_tab_foreground  #000000
active_tab_background  #FFFFFF
inactive_tab_foreground #888888
inactive_tab_background #111111

# --- Cores normais (0–7) ---
color0  #000000
color1  #5C5C5C
color2  #7A7A7A
color3  #9A9A9A
color4  #4D4D4D
color5  #B5B5B5
color6  #C7C7C7
color7  #E6E6E6

# --- Cores brilhantes (8–15) ---
color8  #4A4A4A
color9  #6E6E6E
color10 #8C8C8C
color11 #ABABAB
color12 #5E5E5E
color13 #C9C9C9
color14 #D9D9D9
color15 #FFFFFF

# --- URL e marcação ---
url_color #FFFFFF
url_style curly

# --- Splits / janelas ---
window_padding_width 10
hide_window_decorations no
confirm_os_window_close 0
